<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Crew | Living in the Delta</title>
  <link rel="stylesheet" href="crew-application.css">
</head>
<body>
  <main class="application-page">
    <div class="application-wrap">
      <a class="back-link" href="index.html">← Back to Living in the Delta</a>

      <header class="application-header">
        <p class="application-kicker">Volunteer production crew</p>
        <h1>Join the people telling the Delta’s stories.</h1>
        <p>Share your experience, availability, and the role you are interested in.</p>
      </header>

      <section class="application-card">
        <form id="crewApplication">
          <div class="application-grid">
            <div class="field"><label for="name">Full Name *</label><input id="name" name="name" required></div>
            <div class="field"><label for="email">Email *</label><input id="email" name="email" type="email" required></div>
            <div class="field"><label for="phone">Phone *</label><input id="phone" name="phone" type="tel" required></div>
            <div class="field"><label for="city">City and State *</label><input id="city" name="city" required></div>
            <div class="field">
              <label for="position">Position *</label>
              <select id="position" name="position" required>
                <option value="">Choose a role</option>
                <option>Camera Operator</option>
                <option>Drone Operator</option>
                <option>Photographer</option>
                <option>Video Editor</option>
                <option>Audio Technician</option>
                <option>Production Assistant</option>
                <option>Story Researcher</option>
                <option>Historian</option>
                <option>Writer</option>
                <option>Social Media Team</option>
                <option>Graphic Designer</option>
                <option>Community Volunteer</option>
                <option>Other</option>
              </select>
            </div>
            <div class="field"><label for="age">Age</label><input id="age" name="age" type="number" min="13" max="100"></div>
            <div class="field full"><label for="experience">Relevant Experience</label><textarea id="experience" name="experience"></textarea></div>
            <div class="field full"><label for="equipment">Equipment You Own</label><textarea id="equipment" name="equipment"></textarea></div>
            <div class="field full"><label for="availability">Availability *</label><textarea id="availability" name="availability" required></textarea></div>
            <div class="field full"><label for="portfolio">Portfolio or Demo Reel</label><input id="portfolio" name="portfolio" type="url" placeholder="https://"></div>
            <div class="field full"><label for="why">Why do you want to join? *</label><textarea id="why" name="why" required></textarea></div>
            <div class="field full">
              <label for="volunteer">Volunteer Confirmation *</label>
              <select id="volunteer" name="volunteer" required>
                <option value="">Choose one</option>
                <option>Yes, I understand this is currently a volunteer opportunity.</option>
                <option>No, I am only interested in paid opportunities.</option>
              </select>
            </div>
          </div>

          <div class="notice">
            Applicants under 18 may need permission from a parent or guardian before participating.
          </div>

          <button class="submit-button" type="submit">Create Application Email →</button>
        </form>
      </section>
    </div>
  </main>
  <script src="crew-application.js"></script>
</body>
</html>
